name: Deploy Registry

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-registry
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy registry
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build registry artifacts
        run: pnpm --filter @getdashfy/registry build

      - name: Validate registry artifacts
        run: pnpm --filter @getdashfy/registry validate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/registry/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
